<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Товари</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #2a7ae2; }

        /* Категории */
        .categories { display: flex; flex-wrap: wrap; gap: 10px; margin: 24px 0; }
        .cat-btn {
            padding: 8px 18px; border: 2px solid #2a7ae2; border-radius: 20px;
            background: white; color: #2a7ae2; cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .cat-btn:hover { background: #e8f0fe; }
        .cat-btn.active { background: #2a7ae2; color: white; }

        /* Счётчик */
        .count { color: #888; font-size: 0.9rem; margin-bottom: 16px; }

        /* Карточки */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #f5f5f5; }
        .card-body { padding: 15px; }
        .card-body h3 { margin: 0 0 6px; font-size: 1rem; }
        .price { font-size: 1.2rem; font-weight: bold; color: #2a7ae2; margin-bottom: 6px; }
        .category-tag {
            display: inline-block; font-size: 0.75rem; background: #e8f0fe;
            color: #2a7ae2; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
        }
        .description { font-size: 0.85rem; color: #555; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .empty { text-align: center; padding: 40px; color: #aaa; font-size: 1.1rem; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">← Головна</a>
    <a href="admin/">Admin</a>
</nav>

<h1>Товари</h1>

<div class="categories" id="categories"></div>
<div class="count" id="count"></div>
<div class="grid" id="products">
    <p class="loading">Завантаження...</p>
</div>

<script>
    const REPO = 'VadimKharovyuk/GitHub_Pages_Decap_CMS';
    const API  = `https://api.github.com/repos/${REPO}/contents/products`;

    let allProducts = [];
    let activeCategory = 'all';

    async function loadProducts() {
        const container = document.getElementById('products');
        try {
            const res   = await fetch(API);
            const files = await res.json();

            if (!Array.isArray(files) || files.length === 0) {
                container.innerHTML = '<p class="loading">Товарів поки немає.</p>';
                return;
            }

            allProducts = await Promise.all(
                files
                    .filter(f => f.name.endsWith('.json'))
                    .map(f => fetch(f.download_url).then(r => r.json()))
            );

            renderCategories();
            renderProducts(allProducts);

        } catch (e) {
            container.innerHTML = '<p class="loading">Помилка завантаження.</p>';
        }
    }

    function renderCategories() {
        const cats = ['all', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
        const container = document.getElementById('categories');
        container.innerHTML = cats.map(cat => `
        <button class="cat-btn ${cat === activeCategory ? 'active' : ''}"
          onclick="filterBy('${cat}')">
          ${cat === 'all' ? 'Всі товари' : cat}
        </button>
      `).join('');
    }

    function filterBy(cat) {
        activeCategory = cat;
        renderCategories();
        const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
        renderProducts(filtered);
    }

    function renderProducts(products) {
        const container = document.getElementById('products');
        const count = document.getElementById('count');
        count.textContent = `Показано: ${products.length} товар(ів)`;

        if (products.length === 0) {
            container.innerHTML = '<p class="empty">Товарів у цій категорії немає.</p>';
            return;
        }

        container.innerHTML = products.map(p => `
        <div class="card">
          ${p.photo
            ? `<img src="${p.photo}" alt="${p.name}" />`
            : `<div style="height:200px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#aaa">Без фото</div>`
        }
          <div class="card-body">
            ${p.category ? `<span class="category-tag">${p.category}</span>` : ''}
            <h3>${p.name}</h3>
            <div class="price">$${p.price}</div>
            <div class="description">${p.description || ''}</div>
          </div>
        </div>
      `).join('');
    }

    loadProducts();
</script>
</body>
</html>
